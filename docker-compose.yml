version: '3.8'

services:
  script-runner:
    build: .
    container_name: script-runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Persist database
      - ./data/scripts.sqlite:/app/scripts.sqlite
      # Persist uploaded scripts
      - ./data/scripts:/app/scripts
      # Persist log files
      - ./data/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/scripts"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
